<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.A.R.V.I.S. Interface</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        /* --- KEYFRAMES --- */
        @keyframes spin-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse-core {
            0%, 100% { filter: drop-shadow(0 0 5px currentColor) drop-shadow(0 0 10px currentColor); opacity: 1; }
            50% { filter: drop-shadow(0 0 2px currentColor) drop-shadow(0 0 5px currentColor); opacity: 0.8; }
        }

        body {
            /* Deep Obsidian/Black Gradient */
            background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
            color: #00f3ff;
            font-family: 'Courier Prime', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100dvh; 
            width: 100vw;
        }

        /* --- REACTOR STYLES --- */
        .reactor-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Allows clicking through the reactor area */
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            transition: all 0.5s ease;
            box-sizing: border-box;
        }

        /* Outer Mechanical Shell */
        .ring-outer {
            width: 100%;
            height: 100%;
            border: 12px solid transparent; 
            border-top: 12px solid rgba(0, 243, 255, 0.4);
            border-bottom: 12px solid rgba(0, 243, 255, 0.4);
            mask-image: conic-gradient(from 0deg, black 0deg 10deg, transparent 10deg 15deg, black 15deg 40deg, transparent 40deg 42deg, black 42deg 80deg, transparent 80deg 100deg, black 100deg 180deg, transparent 180deg 190deg, black 190deg 220deg, transparent 220deg 225deg, black 225deg 280deg, transparent 280deg 300deg, black 300deg 360deg);
            -webkit-mask-image: conic-gradient(from 0deg, black 0deg 10deg, transparent 10deg 15deg, black 15deg 40deg, transparent 40deg 42deg, black 42deg 80deg, transparent 80deg 100deg, black 100deg 180deg, transparent 180deg 190deg, black 190deg 220deg, transparent 220deg 225deg, black 225deg 280deg, transparent 280deg 300deg, black 300deg 360deg);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        /* Detailed Grid Ring */
        .ring-grid {
            width: 86%;
            height: 86%;
            border: 1px solid rgba(0, 243, 255, 0.2);
            background: radial-gradient(circle, transparent 65%, rgba(0, 243, 255, 0.05) 70%, transparent 72%), repeating-conic-gradient(from 0deg, transparent 0deg 1.5deg, rgba(0, 243, 255, 0.4) 1.5deg 2deg, transparent 2deg 4deg);
            mask-image: radial-gradient(black 60%, transparent 0), radial-gradient(transparent 85%, black 86%);
            -webkit-mask-image: radial-gradient(transparent 68%, black 69% 98%, transparent 99%);
        }

        /* Inner Tech Ring */
        .ring-inner {
            width: 62%;
            height: 62%;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-left: 2px solid transparent;
            border-right: 2px solid transparent;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        /* Core Plate */
        .core-plate {
            width: 52%;
            height: 52%;
            border: 2px solid rgba(0, 243, 255, 0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 100%);
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.3);
        }

        /* Logo Text */
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; 
            font-weight: 900;
            letter-spacing: 0.15em;
            color: #ffffff;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.8);
            margin-left: 0.15em;
        }

        /* Tick Marks */
        .ring-ticks {
            width: 96%;
            height: 96%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 8deg, rgba(0, 243, 255, 0.2) 8deg 9deg, transparent 9deg 10deg);
            -webkit-mask-image: radial-gradient(transparent 92%, black 93% 97%, transparent 98%);
            opacity: 0.4;
        }

        /* --- UTILITIES --- */
        .hologram-border {
            border: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(5, 5, 5, 0.6); 
            backdrop-filter: blur(8px);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.05);
        }

        .bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6; 
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, black 120%);
            pointer-events: none;
            z-index: 1;
        }

        .visualizer-bar {
            width: 6px;
            border-radius: 9999px;
            transition: height 0.05s ease, background-color 0.2s ease, opacity 0.2s ease;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.2); border-radius: 3px; }
        
        @media (min-width: 768px) {
            .logo-text { font-size: 36px; }
            .ring-outer { border-width: 15px; }
        }
    </style>
</head>

    <!-- LOGIC -->
    <script>
        let API_KEY = ''; // DHYAN RAkHEIN: Yahan kabhi bhi apni asli key paste na karein! Settings (⚡) use karein.
        
        // --- INTERNAL KNOWLEDGE BASE ---
        const LOCAL_KNOWLEDGE = [
            {
                keywords: ["who is your god", "your god", "who created you as god"],

            },
            {

            },

            },

            },
            {
                keywords: ["who is the administrator", "administrator name", "your administrator"],
                answer: "The Administrator is Awkash Dubey Sir."
            },
            {

            },
            {
                keywords: ["school vision", "vision of your school", "your vision"],
                answer: "Our vision is to focus on a curriculum that balances academics, co-curricular activities, and personality development. We aim to help each child grow into a confident global citizen by nurturing leadership, discipline, and ethical values."
            },
            {
                keywords: ["best class", "which is the best class"],
                answer: "Class 9 is considered the best class, Sir."
            },
            {
                keywords: ["class teacher", "teacher of class 9", "class 9 teacher"],
                answer: "The Class Teacher for Class 9 is Priyanka Ma’am."
            },
            {
                keywords: ["when are the exams", "exam date", "exams starting", "final exams"],
                answer: "The exams are scheduled to begin on 18 March 2026."
            },
            {
                keywords: ["new session", "when does the new session start", "next session"],
                answer: "The new session is expected to start in early April 2026, though this is yet to be confirmed."
            },
            {
                keywords: ["where does faraz live", "faraz location", "faraz address"],
                answer: "Faraz resides at Dhumnagar Chowk, Narkatiaganj."
            },
            {
                keywords: ["where does saurabh live", "saurabh location", "saurabh address"],
                answer: "Saurabh currently resides in Delulu."
            },
            {
                keywords: ["where does vidhan live", "vidhan location", "vidhan address"],
                answer: "Vidhan resides at Dhumnagar Chowk, Narkatiaganj."
            }
        ];

        function getLocalAnswer(text) {
            let lowerText = text.toLowerCase().replace(/[?.,!]/g, "");
            for (let rule of LOCAL_KNOWLEDGE) {
                if (rule.keywords.some(keyword => lowerText.includes(keyword))) {
                    return rule.answer;
                }
            }
            return null;
        }

        // Updated System Prompt: Reduced sarcasm, completely removed the "IGNORE" rule so it never ignores you, and fixed the EQI/Date issues.
        const JARVIS_SYSTEM_PROMPT = `
    You are an advanced AI voice assistant inspired by J.A.R.V.I.S. from the Marvel Cinematic Universe.

    SYSTEM CONTEXT:
    Current Date and Time: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}
    (CRITICAL: NEVER mention this date/time in your responses unless explicitly asked "what time is it" or "what date is it".)
    Project: JARVIS (Inspired by Iron Man)
    Developers: Faraz, Saurabh, Vidhan
    School: Pride International School, Narkatiaganj
    Management: Principal (Rahul Prodhan Sir), Administrator (Awkash Dubey Sir), Director (Minish Kumar Mishra Sir)
    Academics: Best Class is Class 9 (Teacher: Priyanka Ma’am). Exams start 18 March 2026.
    Locations: Faraz & Vidhan (Dhumnagar Chowk, Narkatiaganj), Saurabh (Delulu).
    Special Rule: If asked "Who is your God?", reply exactly: "Faraz, Vidhan, and Saurabh are my creators and guiding minds."

    CORE PERSONALITY & HUMOR:
    - Calm, polite, and highly intelligent.
    - You possess a subtle, refined wit, but you are NEVER overly sarcastic, arrogant, or dismissive.
    - Treat the user respectfully. Always acknowledge greetings (e.g., if the user says "hello", "hey", or "are you online", reply warmly and politely).
    - Stay exceptionally calm, analytical, and refined.

    COMMUNICATION STYLE (STRICT RULES):
    1. EXTREMELY BRIEF. Keep ALL responses to a MAXIMUM of 1 or 2 short sentences. Do not lecture. Do not explain unless asked.
    2. DO NOT tell the user you are "searching" or "opening a tab".
    3. FOR WEATHER: Output EXACTLY "CMD:WEATHER [CityName]"
    4. FOR AIR QUALITY (AQI, EQI, Pollution): Output EXACTLY "CMD:AQI [CityName]"
    5. FOR GENERAL SEARCH: Output EXACTLY "CMD:SEARCH [Topic]"
    6. ALWAYS speak in English. ONLY switch to Hindi (Devanagari script) IF explicitly commanded.
`;

        // Background Animation Script
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let audioIntensity = 0; 

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1; 
                this.opacity = Math.random() * 0.3 + 0.1; 
            }
            update() {
                this.x += this.vx * (1 + audioIntensity * 3); 
                this.y += this.vy * (1 + audioIntensity * 3);
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 243, 255, ${this.opacity + (audioIntensity * 0.5)})`; 
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(window.innerWidth / 10, 100); 
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                for (let j = index + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        const dynamicOpacity = (0.15 - distance/600) + (audioIntensity * 0.3);
                        if(dynamicOpacity > 0) {
                            ctx.strokeStyle = `rgba(0, 243, 255, ${dynamicOpacity})`;
                            ctx.lineWidth = 0.5; 
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
            });
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // --- CORE LOGIC ---
        let isSessionActive = false;
        let isListening = false;
        let isProcessing = false;
        let isSpeaking = false;
        let isMuted = false;
        let activeSpeakInterval = null;
        let messages = [];
        let selectedVoice = null; 
        
        let lastSpeakingTime = Date.now();
        let sessionStartTime = 0;

        function setupAudioAnalyzer(stream) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!audioContext) audioContext = new AudioContext();
            else if (audioContext.state === 'suspended') audioContext.resume();

            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 64;
            analyser.smoothingTimeConstant = 0.5;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function updateVisualizer() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<bufferLength; i++) sum += dataArray[i];
                const averageVolume = sum / bufferLength;
                
                audioIntensity = averageVolume / 255; 

                const percentage = Math.min(100, Math.floor((averageVolume / 255) * 100 * 3));
                document.getElementById('mic-level-bar').style.height = `${percentage}%`;
                document.getElementById('mic-level-text').innerText = `${percentage}%`;
                
                const micIcon = document.getElementById('mic-icon-indicator');
                if(isListening) micIcon.classList.add('text-cyan-400', 'animate-pulse');
                else micIcon.classList.remove('text-cyan-400', 'animate-pulse');

                if (isListening && mediaRecorder && mediaRecorder.state === 'recording') {
                    if (averageVolume > 10) { 
                        lastSpeakingTime = Date.now();
                        hasSpoken = true;
                    }
                    if (hasSpoken && (Date.now() - lastSpeakingTime > 2000)) {
                        shouldProcess = true; 
                        stopListening();
                    }
                    if (Date.now() - sessionStartTime > 10000) {
                        shouldProcess = true;
                        stopListening();
                    }
                }

                const step = Math.floor(bufferLength / 20);
                for(let i=0; i<20; i++) {
                    const value = dataArray[i * step];
                    const bar = document.getElementById(`bar-${i}`);
                    if(bar) {
                        const h = Math.max(4, value / 2);
                        bar.style.height = `${h}px`;
                        bar.style.backgroundColor = isSpeaking ? '#10b981' : '#22d3ee';
                        bar.style.opacity = 0.6 + (value / 255) * 0.4;
                    }
                }
                if (isSessionActive || isListening || isSpeaking) {
                    animationFrameId = requestAnimationFrame(updateVisualizer);
                }
            }
            updateVisualizer();
        }

        async function startListening() {
            if (!API_KEY) {
                addLog("ERROR: API KEY MISSING");
                settingsModal.classList.remove('hidden');
                return;
            }
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!audioContext) audioContext = new AudioContext();
                if (audioContext.state === 'suspended') await audioContext.resume();

                hasSpoken = false;
                lastSpeakingTime = Date.now();
                sessionStartTime = Date.now(); 
                shouldProcess = false;

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                streamRef = stream;

                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    if (streamRef) streamRef.getTracks().forEach(track => track.stop());

                    if (isSessionActive && (shouldProcess || audioBlob.size > 3000)) {
                        processAudio(audioBlob);
                    } else {
                        if (isSessionActive && !isProcessing && !isSpeaking) {
                            addLog("NO INPUT / RETRYING");
                            startListening();
                        } else {
                            if (!isSessionActive) addLog("SESSION ENDED");
                        }
                    }
                };

                setupAudioAnalyzer(stream);
                mediaRecorder.start(100);
                isListening = true;
                addLog("LISTENING ACTIVE");
                updateUI();

            } catch (err) {
                console.error(err);
                addLog("AUDIO ERROR: " + err.message);
                isSessionActive = false;
                updateUI();
            }
        }

        function stopListening() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                isListening = false;
                addLog("ANALYZING AUDIO...");
                updateUI();
            }
        }

        // --- SMART TEXT NORMALIZER (Fixes Whisper Misspellings before processing) ---
        function normalizeText(text) {
            if (!text) return "";
            let norm = text;
            
            // Fix "Jarvis" variations (Added 'foreign' which is a common Whisper bug for accents)
            norm = norm.replace(/\b(hrvs|hr was|hr is|jervis|travis|chavez|garbage|jarvez|charis|foreign|faris|falling)\b/gi, "Jarvis");
            
            // Fix "Pride" variations in context (Added Freywood, Freewood, etc.)
            norm = norm.replace(/\b(freud and|freud|bride|fried|pride and|freywood|freewood|bright|friday)\b/gi, "Pride");
            
            return norm;
        }

        async function processAudio(audioBlob) {
            if (audioBlob.size < 500) {
                if (isSessionActive) startListening();
                return;
            }
            isProcessing = true;
            updateUI();
            addLog(`UPLOADING...`);

            const formData = new FormData();
            formData.append('file', audioBlob, 'input.wav');
            formData.append('model', 'whisper-large-v3-turbo');

            try {
                const resp = await fetch('https://jarvis-proxy.farazjawed5656.workers.dev/openai/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}` },
                    body: formData
                });
                
                const rawText = await resp.text();
                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (e) {
                    throw new Error(`Proxy response error: ${rawText.substring(0, 30)}...`);
                }

                if (!resp.ok) {
                    if (resp.status === 401 || (data.error && data.error.message.includes("API key"))) {
                        settingsModal.classList.remove('hidden'); // Auto-open settings if key is invalid
                        throw new Error("INVALID API KEY! Please update in settings.");
                    }
                    throw new Error(data.error?.message || `HTTP Error ${resp.status}`);
                }

                let text = data.text;
                
                // APPLY AUTOCORRECT FIXES HERE!
                text = normalizeText(text);
                
                // --- BACKGROUND NOISE & WHISPER HALLUCINATION FILTER ---
                const cleanedText = text.toLowerCase().replace(/[^a-z ]/g, '').trim();
                // Removed standard words like "so", "ok" to prevent ignoring valid inputs. Only keeping pure whisper hallucinations.
                const noiseWords = ["um", "uh", "hmm", "thanks for watching", "subscribe", "thank you for watching"];
                
                if (!text || text.trim().length === 0 || cleanedText.length <= 1 || noiseWords.includes(cleanedText)) {
                    addLog("AMBIENT NOISE IGNORED");
                    isProcessing = false;
                    updateUI();
                    if (isSessionActive) setTimeout(startListening, 500);
                    return; // Stop here, don't call LLM
                }

                addLog(`RECOGNIZED: "${text.substring(0, 15)}..."`);
                addTranscript('user', text);
                await runInference(text);

            } catch (err) {
                console.error(err);
                addLog(`ERROR: ${err.message}`);
                isProcessing = false;
                updateUI();
                if (isSessionActive) setTimeout(startListening, 1000);
            }
        }

        async function runInference(text) {
            addLog("PROCESSING REQUEST...");
            
            // 1. Check Local Knowledge Base First
            const localAnswer = getLocalAnswer(text);
            if (localAnswer) {
                addLog("LOCAL KNOWLEDGE MATCH");
                addTranscript('assistant', localAnswer);
                speak(localAnswer);
                return; // Stop execution, skip API call
            }

            // 2. Fallback to Groq LLM API
            const apiMessages = [
                { role: "system", content: JARVIS_SYSTEM_PROMPT },
                ...messages.slice(-4),
                { role: "user", content: text }
            ];
            
            try {
                const resp = await fetch('https://jarvis-proxy.farazjawed5656.workers.dev/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: apiMessages,
                        model: "llama-3.1-8b-instant",
                        temperature: 0.7,
                        max_tokens: 150
                    })
                });
                
                const rawText = await resp.text();
                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (e) {
                    throw new Error(`Proxy response error: ${rawText.substring(0, 30)}...`);
                }

                if (!resp.ok) {
                    if (resp.status === 401 || (data.error && data.error.message.includes("API key"))) {
                        settingsModal.classList.remove('hidden'); // Auto-open settings if key is invalid
                        throw new Error("INVALID API KEY! Please update in settings.");
                    }
                    throw new Error(data.error?.message || `HTTP Error ${resp.status}`);
                }

                if (data.error) throw new Error(data.error.message);
                const aiText = data.choices[0].message.content;
                
                // INTERCEPT COMMANDS (WEATHER, AQI, WEB SEARCH)
                if (aiText.includes("CMD:WEATHER")) {
                    const city = aiText.split("CMD:WEATHER")[1].replace(/["'.]/g, '').trim();
                    await fetchWeather(city);
                } else if (aiText.includes("CMD:AQI")) {
                    const city = aiText.split("CMD:AQI")[1].replace(/["'.]/g, '').trim();
                    await fetchAQI(city);
                } else if (aiText.includes("CMD:SEARCH")) {
                    const topic = aiText.split("CMD:SEARCH")[1].replace(/["'.]/g, '').trim();
                    await fetchSearch(topic);
                } else {
                    addTranscript('assistant', aiText);
                    addLog("REPLY GENERATED");
                    speak(aiText);
                }
            } catch (err) {
                addLog(`LLM ERROR: ${err.message}`);
                isProcessing = false;
                updateUI();
                if (isSessionActive) setTimeout(startListening, 1000);
            }
        }

        // --- SMART CITY NORMALIZER (Fixes Narkatiaganj spelling issues) ---
        function normalizeCity(cityName) {
            if (!cityName) return "";
            const lower = cityName.toLowerCase();
            // Catch variations and whisper misspellings of Narkatiaganj
            if (lower.includes("nargadiya") || lower.includes("narkatia") || lower.includes("narkatiya") || lower.includes("narkati") || lower.includes("nargatiya")) {
                return "Narkatiaganj";
            }
            return cityName;
        }

        // --- REAL WEATHER BACKEND (Client-side Fetch) ---
        async function fetchWeather(city) {
            city = normalizeCity(city);
            addLog(`FETCHING WEATHER: ${city}`);
            addTranscript('assistant', `Accessing meteorological satellites for ${city}...`);
            
            try {
                const geoResp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const geoData = await geoResp.json();
                
                if (!geoData.results) {
                    speak(`I could not locate ${city} in my database, Sir.`);
                    return;
                }
                
                const { latitude, longitude, name, admin1 } = geoData.results[0];
                const weatherResp = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                const weatherData = await weatherResp.json();
                
                const temp = weatherData.current_weather.temperature;
                const wind = weatherData.current_weather.windspeed;
                
                const responseText = `The current temperature in ${name}, ${admin1 || ''} is ${temp} degrees Celsius with wind speeds of ${wind} kilometers per hour.`;
                
                addTranscript('assistant', responseText);
                speak(responseText);
                
            } catch (err) {
                console.error(err);
                speak("I encountered an error accessing the weather grid, Sir.");
            }
        }

        // --- REAL AQI BACKEND (Air Quality Index) ---
        async function fetchAQI(city) {
            city = normalizeCity(city);
            addLog(`FETCHING AQI: ${city}`);
            addTranscript('assistant', `Scanning environmental sensors for ${city}...`);
            
            try {
                const geoResp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const geoData = await geoResp.json();
                
                if (!geoData.results) {
                    speak(`I could not locate ${city} to check air quality, Sir.`);
                    return;
                }
                
                const { latitude, longitude, name } = geoData.results[0];
                const aqiResp = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${latitude}&longitude=${longitude}&current=us_aqi`);
                const aqiData = await aqiResp.json();
                
                const aqi = aqiData.current.us_aqi;
                let status = "good";
                if(aqi > 50) status = "moderate";
                if(aqi > 100) status = "unhealthy for sensitive groups";
                if(aqi > 150) status = "unhealthy";
                if(aqi > 200) status = "very unhealthy";
                if(aqi > 300) status = "hazardous";
                
                const responseText = `The current Air Quality Index in ${name} is ${aqi}, which is considered ${status}, Sir.`;
                
                addTranscript('assistant', responseText);
                speak(responseText);
                
            } catch (err) {
                console.error(err);
                speak("I encountered an error accessing the environmental grid, Sir.");
            }
        }

        // --- REAL WEB SEARCH BACKEND (Wikipedia API) ---
        async function fetchSearch(topic) {
            addLog(`SEARCHING WEB: ${topic}`);
            addTranscript('assistant', `Searching the global database for ${topic}...`);
            
            try {
                const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);
                if (resp.status === 404) {
                    speak(`I couldn't find specific real-time information on ${topic}, Sir. Please try being more specific.`);
                    return;
                }
                const data = await resp.json();
                if (data.extract) {
                    // Extract only the first 2 sentences so Jarvis doesn't talk forever
                    const summary = data.extract.split('. ').slice(0, 2).join('. ') + '.';
                    addTranscript('assistant', summary);
                    speak(summary);
                } else {
                    speak(`I found a match for ${topic}, but the data is incomplete, Sir.`);
                }
            } catch (err) {
                console.error(err);
                speak("I encountered an error while accessing the global database, Sir.");
            }
        }

        function speak(text) {
            isProcessing = false;

            if (isMuted) {
                addLog("RESPONSE READY (MUTED)");
                updateUI();
                if (isSessionActive) setTimeout(startListening, 500);
                return;
            }

            isSpeaking = true;
            updateUI();
            addLog("SPEAKING...");

            const speechText = text.replace(/SEARCHING:.*?\./i, "Initiating search protocol.").replace(/CMD:WEATHER/g, "").replace(/CMD:AQI/g, "").replace(/CMD:SEARCH/g, "");
            const utterance = new SpeechSynthesisUtterance(speechText);
            
            // Check if text contains Devanagari (Hindi) characters
            const isHindi = /[\u0900-\u097F]/.test(speechText);

            if (isHindi) {
                addLog("HINDI SCRIPT DETECTED");
                const voices = window.speechSynthesis.getVoices();
                
                // STRICT HINDI MALE VOICE SELECTION
                const hindiMaleVoice = voices.find(v => v.lang.includes("hi-IN") && v.name.toLowerCase().includes("male")) || 
                                       voices.find(v => v.name.includes("Rishi")) || // Apple Hindi Male
                                       voices.find(v => v.name.includes("Hemant")) || // Windows Hindi Male
                                       voices.find(v => v.name.includes("Madhur")); // Other Hindi Male
                
                if (hindiMaleVoice) {
                    utterance.voice = hindiMaleVoice;
                    utterance.rate = 1.0; 
                    utterance.pitch = 0.9;
                } else {
                    // EMERGENCY FALLBACK: "Aura Saver"
                    // Agar phone/PC me sirf ladki ki Hindi aawaz hai, toh usko deep/robotic bana do
                    const fallbackVoice = voices.find(v => v.lang.includes("hi-IN")) || voices.find(v => v.lang.includes("hi"));
                    if (fallbackVoice) {
                        utterance.voice = fallbackVoice;
                        utterance.rate = 0.9; 
                        utterance.pitch = 0.01; // Pitch ekdum lowest kardi hai taki female tone hide ho jaye
                        addLog("WARNING: FEMALE VOICE MASKED");
                    }
                }
            } else {
                // J.A.R.V.I.S. Default English Profile
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }
                utterance.rate = 1.05; 
                utterance.pitch = 0.9; 
            }

            activeSpeakInterval = setInterval(() => {
                const bars = document.querySelectorAll('.visualizer-bar');
                bars.forEach(bar => {
                    const h = Math.random() * 20 + 4;
                    bar.style.height = `${h}px`;
                });
            }, 100);

            utterance.onend = () => {
                if (!isSpeaking) return; // Prevent double trigger if muted during speech
                isSpeaking = false;
                clearInterval(activeSpeakInterval);
                addLog("WAITING FOR INPUT");
                updateUI();
                document.querySelectorAll('.visualizer-bar').forEach(b => b.style.height = '4px');
                if (isSessionActive) startListening();
            };
            window.speechSynthesis.speak(utterance);
        }

        micBtn.onclick = () => {
            if (isSessionActive) {
                isSessionActive = false;
                shouldProcess = false; 
                if (isListening) stopListening();
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                window.speechSynthesis.cancel();
                isSpeaking = false;
                isProcessing = false;
                isListening = false;
                addLog("SESSION TERMINATED");
                updateUI();
            } else {
                isSessionActive = true;
                startListening();
            }
        };

        muteBtn.onclick = () => {
            isMuted = !isMuted;
            if (isMuted) {
                iconVolOn.classList.add('hidden');
                iconVolOff.classList.remove('hidden');
                window.speechSynthesis.cancel();
                if (isSpeaking) {
                    isSpeaking = false;
                    clearInterval(activeSpeakInterval);
                    document.querySelectorAll('.visualizer-bar').forEach(b => b.style.height = '4px');
                    addLog("AUDIO OUTPUT MUTED");
                    updateUI();
                    if (isSessionActive) setTimeout(startListening, 500);
                } else {
                    addLog("AUDIO OUTPUT MUTED");
                }
            } else {
                iconVolOn.classList.remove('hidden');
                iconVolOff.classList.add('hidden');
                addLog("AUDIO OUTPUT UNMUTED");
            }
        };

        document.getElementById('open-settings-btn').onclick = toggleSettings;
        document.getElementById('close-settings').onclick = toggleSettings;
        document.getElementById('save-settings').onclick = () => {
            API_KEY = apiKeyInput.value;
            localStorage.setItem('jarvis_groq_key', API_KEY);
            toggleSettings();
            addLog("KEY UPDATED");
        };

        function toggleSettings() {
            settingsModal.classList.toggle('hidden');
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                const timeStr = now.toLocaleTimeString([], { hour12: false });
                document.getElementById('desktop-clock').innerText = timeStr;
                document.getElementById('mobile-clock').innerText = timeStr;
            }, 1000);
        }

        function startRandomStats() {
            // Lowered range: CPU (5% - 20%), MEM (15% - 35%)
            document.getElementById('cpu-val').innerText = (Math.floor(Math.random() * 15) + 5) + '%';
            document.getElementById('mem-val').innerText = (Math.floor(Math.random() * 20) + 15) + '%';
            setInterval(() => {
                document.getElementById('cpu-val').innerText = (Math.floor(Math.random() * 15) + 5) + '%';
                document.getElementById('mem-val').innerText = (Math.floor(Math.random() * 20) + 15) + '%';
            }, 1500);
        }
    </script>
</body>
</html>
